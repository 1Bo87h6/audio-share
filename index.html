<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>مشاركة الصوت</title> <style> *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px} h1{font-size:1.6rem;margin-bottom:8px;color:#a78bfa} p.sub{font-size:.9rem;color:#888;margin-bottom:30px} .card{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:16px;padding:24px;width:100%;max-width:420px;margin-bottom:16px} .card h2{font-size:1rem;margin-bottom:16px;color:#c4b5fd} input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #3d3d6e;background:#0f0f1a;color:#fff;font-size:1.2rem;margin-bottom:12px;text-align:center;letter-spacing:4px} button{width:100%;padding:12px;border-radius:10px;border:none;font-size:1rem;cursor:pointer;font-weight:bold;margin-top:8px;transition:.2s} .bp{background:#7c3aed;color:#fff}.bp:hover{background:#6d28d9}.bp:disabled{background:#3d2070;color:#888;cursor:not-allowed} .bs{background:#1e3a5f;color:#7dd3fc} .bd{background:#7f1d1d;color:#fca5a5} #status{margin-top:8px;padding:12px 16px;border-radius:10px;background:#0f0f1a;border:1px solid #2d2d4e;font-size:.9rem;color:#94a3b8;text-align:center;width:100%;max-width:420px} #roomCode{font-size:2rem;font-weight:bold;color:#a78bfa;letter-spacing:8px;text-align:center;margin:14px 0 6px;display:none;background:#0f0f1a;padding:12px;border-radius:10px;border:1px dashed #7c3aed} audio{width:100%;margin-top:12px;border-radius:8px;display:none} #log{margin-top:12px;padding:10px;border-radius:8px;background:#0a0a14;border:1px solid #1e1e3e;font-size:.75rem;color:#4ade80;width:100%;max-width:420px;max-height:150px;overflow-y:auto;direction:ltr;text-align:left} </style> </head> <body> <h1>🔊 مشاركة الصوت</h1> <p class="sub">Windows → iPhone | iPhone Mic → Windows</p> <div class="card"> <h2>📡 إنشاء غرفة — Windows (Chrome)</h2> <button class="bp" id="createBtn">إنشاء غرفة + مشاركة الصوت</button> <div id="roomCode"></div> <button class="bs" id="copyBtn" style="display:none">📋 نسخ الكود</button> <button class="bd" id="stopHostBtn" style="display:none">⏹ إيقاف</button> </div> <div class="card"> <h2>🎙 الانضمام — iPhone (Safari)</h2> <input type="text" id="joinCode" placeholder="XXXXXX" maxlength="6"/> <button class="bp" id="joinBtn">انضمام + تفعيل المايك</button> <button class="bd" id="stopGuestBtn" style="display:none">⏹ قطع الاتصال</button> <audio id="remoteAudio" controls></audio> </div> <div id="status">⏳ جاري التحميل...</div> <div id="log"></div> <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js" onload="onPeerLoaded()" onerror="onPeerError()"></script> <script> (function() { var peer, currentCall, localStream, currentRoom; function log(msg) { var el = document.getElementById('log'); el.innerHTML += msg + '<br>'; el.scrollTop = el.scrollHeight; } function setStatus(msg) { document.getElementById('status').textContent = msg; log(msg); } function randCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); } window.onPeerLoaded = function() { log('✅ PeerJS محمّل بنجاح'); setStatus('✅ جاهز — اضغط إنشاء غرفة أو أدخل الكود'); }; window.onPeerError = function() { setStatus('❌ فشل تحميل المكتبة — تأكد من الإنترنت وأعد التحميل'); }; window.addEventListener('DOMContentLoaded', function() { document.getElementById('createBtn').addEventListener('click', createRoom); document.getElementById('copyBtn').addEventListener('click', copyCode); document.getElementById('stopHostBtn').addEventListener('click', stopHost); document.getElementById('joinBtn').addEventListener('click', joinRoom); document.getElementById('stopGuestBtn').addEventListener('click', stopGuest); }); function createRoom() { if (typeof Peer === 'undefined') { setStatus('❌ المكتبة لم تُحمَّل — أعد تحميل الصفحة'); return; } var btn = document.getElementById('createBtn'); btn.disabled = true; btn.textContent = 'جاري التحضير...'; setStatus('🎤 جاري طلب الصوت...'); navigator.mediaDevices.getDisplayMedia({ video: false, audio: true }) .then(function(stream) { log('✅ تم الحصول على صوت النظام'); startHost(stream); }) .catch(function(e) { log('⚠️ صوت النظام مرفوض: ' + e.message); navigator.mediaDevices.getUserMedia({ audio: true, video: false }) .then(function(stream) { log('✅ يعمل بالمايك'); setStatus('⚠️ يعمل بالمايك فقط'); startHost(stream); }) .catch(function(e2) { setStatus('❌ رُفض الإذن: ' + e2.message); btn.disabled = false; btn.textContent = 'إنشاء غرفة + مشاركة الصوت'; }); }); } function startHost(stream) { localStream = stream; var code = randCode(); currentRoom = code; var roomEl = document.getElementById('roomCode'); roomEl.style.display = 'block'; roomEl.textContent = code; document.getElementById('copyBtn').style.display = 'block'; document.getElementById('stopHostBtn').style.display = 'block'; setStatus('🔗 جاري الاتصال بالخادم...'); peer = new Peer('room-' + code, { host: '0.peerjs.com', port: 443, path: '/', secure: true }); peer.on('open', function(id) { log('✅ متصل: ' + id); setStatus('✅ الغرفة جاهزة! الكود: ' + code + ' — في انتظار الهاتف...'); document.getElementById('createBtn').textContent = 'الغرفة نشطة ✅'; }); peer.on('call', function(call) { currentCall = call; setStatus('📱 الهاتف اتصل! جاري الإجابة...'); call.answer(localStream); call.on('stream', function(remoteStream) { var audio = document.getElementById('remoteAudio'); audio.srcObject = remoteStream; audio.style.display = 'block'; audio.play().catch(function(){}); setStatus('🟢 متصل! صوت الهاتف يصل الآن'); }); call.on('close', function() { setStatus('🔴 انقطع اتصال الهاتف'); }); }); peer.on('error', function(e) { log('❌ ' + e.type); setStatus('❌ خطأ: ' + e.type); var btn = document.getElementById('createBtn'); btn.disabled = false; btn.textContent = 'إنشاء غرفة + مشاركة الصوت'; }); } function joinRoom() { if (typeof Peer === 'undefined') { setStatus('❌ المكتبة لم تُحمَّل — أعد تحميل الصفحة'); return; } var code = document.getElementById('joinCode').value.trim().toUpperCase(); if (!code || code.length < 4) { setStatus('⚠️ أدخل الكود الصحيح'); return; } var btn = document.getElementById('joinBtn'); btn.disabled = true; btn.textContent = 'جاري الاتصال...'; setStatus('🎤 جاري طلب المايك...'); navigator.mediaDevices.getUserMedia({ audio: true, video: false }) .then(function(micStream) { localStream = micStream; log('✅ المايك جاهز'); peer = new Peer({ host: '0.peerjs.com', port: 443, path: '/', secure: true }); peer.on('open', function(myId) { log('✅ متصل: ' + myId); setStatus('📡 جاري الاتصال بالغرفة ' + code + '...'); var call = peer.call('room-' + code, micStream); currentCall = call; call.on('stream', function(remoteStream) { var audio = document.getElementById('remoteAudio'); audio.srcObject = remoteStream; audio.style.display = 'block'; audio.play().catch(function(){}); setStatus('🟢 متصل! صوت Windows يصل الآن'); document.getElementById('stopGuestBtn').style.display = 'block'; btn.textContent = 'متصل ✅'; }); call.on('close', function() { setStatus('🔴 انقطع الاتصال'); btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; }); }); peer.on('error', function(e) { log('❌ ' + e.type); if (e.type === 'peer-unavailable') { setStatus('❌ الغرفة غير موجودة — تأكد من الكود'); } else { setStatus('❌ خطأ: ' + e.type); } btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; }); }) .catch(function(e) { setStatus('❌ رُفض المايك: ' + e.message); btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; }); } function copyCode() { if (navigator.clipboard) { navigator.clipboard.writeText(currentRoom) .then(function() { setStatus('✅ تم النسخ: ' + currentRoom); }) .catch(function() { setStatus('الكود: ' + currentRoom); }); } else { setStatus('الكود: ' + currentRoom); } } function stopHost() { if (localStream) localStream.getTracks().forEach(function(t){ t.stop(); }); if (currentCall) currentCall.close(); if (peer) peer.destroy(); document.getElementById('roomCode').style.display = 'none'; document.getElementById('copyBtn').style.display = 'none'; document.getElementById('stopHostBtn').style.display = 'none'; var btn = document.getElementById('createBtn'); btn.disabled = false; btn.textContent = 'إنشاء غرفة + مشاركة الصوت'; setStatus('⏹ تم إيقاف المشاركة'); } function stopGuest() { if (localStream) localStream.getTracks().forEach(function(t){ t.stop(); }); if (currentCall) currentCall.close(); if (peer) peer.destroy(); document.getElementById('stopGuestBtn').style.display = 'none'; document.getElementById('remoteAudio').style.display = 'none'; var btn = document.getElementById('joinBtn'); btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; setStatus('⏹ تم قطع الاتصال'); } })(); </script> </body> </html>
