<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>مشاركة الصوت</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; } h1 { font-size: 1.6rem; margin-bottom: 8px; color: #a78bfa; } p.sub { font-size: 0.9rem; color: #888; margin-bottom: 30px; } .card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; margin-bottom: 16px; } .card h2 { font-size: 1rem; margin-bottom: 16px; color: #c4b5fd; } input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #3d3d6e; background: #0f0f1a; color: #fff; font-size: 1.2rem; margin-bottom: 12px; text-align: center; letter-spacing: 4px; } button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: bold; margin-top: 8px; } .btn-primary { background: #7c3aed; color: #fff; } .btn-primary:hover { background: #6d28d9; } .btn-primary:disabled { background: #3d2070; color: #888; cursor: not-allowed; } .btn-secondary { background: #1e3a5f; color: #7dd3fc; } .btn-danger { background: #7f1d1d; color: #fca5a5; } #status { margin-top: 8px; padding: 12px 16px; border-radius: 10px; background: #0f0f1a; border: 1px solid #2d2d4e; font-size: 0.9rem; color: #94a3b8; text-align: center; width: 100%; max-width: 420px; } #roomCode { font-size: 2rem; font-weight: bold; color: #a78bfa; letter-spacing: 8px; text-align: center; margin: 14px 0 6px; display: none; background: #0f0f1a; padding: 12px; border-radius: 10px; border: 1px dashed #7c3aed; } audio { width: 100%; margin-top: 12px; border-radius: 8px; display: none; } #log { margin-top: 12px; padding: 10px; border-radius: 8px; background: #0a0a14; border: 1px solid #1e1e3e; font-size: 0.75rem; color: #4ade80; width: 100%; max-width: 420px; max-height: 150px; overflow-y: auto; direction: ltr; text-align: left; } </style> </head> <body> <h1>🔊 مشاركة الصوت</h1> <p class="sub">Windows → iPhone | iPhone Mic → Windows</p> <div class="card"> <h2>📡 إنشاء غرفة — Windows (Chrome)</h2> <button class="btn-primary" id="createBtn">إنشاء غرفة + مشاركة الصوت</button> <div id="roomCode"></div> <button class="btn-secondary" id="copyBtn" style="display:none">📋 نسخ الكود</button> <button class="btn-danger" id="stopHostBtn" style="display:none">⏹ إيقاف</button> </div> <div class="card"> <h2>🎙 الانضمام — iPhone (Safari)</h2> <input type="text" id="joinCode" placeholder="XXXXXX" maxlength="6"/> <button class="btn-primary" id="joinBtn">انضمام + تفعيل المايك</button> <button class="btn-danger" id="stopGuestBtn" style="display:none">⏹ قطع الاتصال</button> <audio id="remoteAudio" controls></audio> </div> <div id="status">⏳ جاري التحميل...</div> <div id="log"></div> <!-- PeerJS من CDN بديل أكثر استقراراً --> <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script> <script src="app.js"></script> </body> </html>
