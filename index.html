<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>مشاركة الصوت</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; } h1 { font-size: 1.6rem; margin-bottom: 8px; color: #a78bfa; } p.sub { font-size: 0.9rem; color: #888; margin-bottom: 30px; } .card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; margin-bottom: 16px; } .card h2 { font-size: 1rem; margin-bottom: 16px; color: #c4b5fd; } input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #3d3d6e; background: #0f0f1a; color: #fff; font-size: 0.95rem; margin-bottom: 12px; text-align: right; } button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: bold; } .btn-primary { background: #7c3aed; color: #fff; } .btn-primary:hover { background: #6d28d9; } .btn-secondary { background: #1e3a5f; color: #7dd3fc; margin-top: 8px; } .btn-secondary:hover { background: #1e40af; } .btn-danger { background: #7f1d1d; color: #fca5a5; margin-top: 8px; } .btn-danger:hover { background: #991b1b; } #status { margin-top: 16px; padding: 10px 16px; border-radius: 10px; background: #0f0f1a; border: 1px solid #2d2d4e; font-size: 0.85rem; color: #94a3b8; min-height: 42px; text-align: center; } #roomCode { font-size: 1.4rem; font-weight: bold; color: #a78bfa; letter-spacing: 4px; text-align: center; margin: 10px 0; display: none; } .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 6px; } .dot.green { background: #22c55e; } .dot.red { background: #ef4444; } .dot.yellow { background: #eab308; animation: pulse 1s infinite; } @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} } audio { width: 100%; margin-top: 12px; border-radius: 8px; display: none; } </style> </head> <body> <h1>🔊 مشاركة الصوت</h1> <p class="sub">Windows ↔ iOS بدون برامج</p> <!-- غرفة جديدة --> <div class="card"> <h2>📡 إنشاء غرفة (Windows)</h2> <button class="btn-primary" onclick="createRoom()">إنشاء غرفة جديدة + مشاركة الصوت</button> <div id="roomCode"></div> <button class="btn-secondary" id="copyBtn" onclick="copyCode()" style="display:none">📋 نسخ الكود</button> <button class="btn-danger" id="stopHostBtn" onclick="stopHost()" style="display:none">⏹ إيقاف المشاركة</button> </div> <!-- الانضمام --> <div class="card"> <h2>🎙 الانضمام للغرفة (iPhone)</h2> <input type="text" id="joinCode" placeholder="أدخل كود الغرفة هنا" maxlength="6"/> <button class="btn-primary" onclick="joinRoom()">انضمام + تفعيل المايك</button> <button class="btn-danger" id="stopGuestBtn" onclick="stopGuest()" style="display:none">⏹ قطع الاتصال</button> <audio id="remoteAudio" controls></audio> </div> <div id="status"><span class="dot yellow"></span> في انتظار الإجراء...</div> <script> // ===== إعدادات PeerJS (مجاني) ===== const PEER_SERVER = { host: '0.peerjs.com', port: 443, path: '/', secure: true }; let peer, currentCall, localStream; let currentRoom = null; function setStatus(msg, type = 'info') { const colors = { info: '#94a3b8', success: '#22c55e', error: '#ef4444', waiting: '#eab308' }; const dots = { info: 'yellow', success: 'green', error: 'red', waiting: 'yellow' }; document.getElementById('status').innerHTML = `<span class="dot ${dots[type]}"></span> ${msg}`; } function randCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); } // ===== إنشاء غرفة (المضيف - Windows) ===== async function createRoom() { try { setStatus('جاري طلب صوت الكمبيوتر...', 'waiting'); // طلب صوت الشاشة (Windows فقط) let stream; try { stream = await navigator.mediaDevices.getDisplayMedia({ video: false, audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 44100 } }); } catch(e) { // إذا رفض مشاركة الشاشة، نجرب المايك stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); setStatus('تم استخدام المايك (لم يتم السماح بصوت النظام)', 'info'); } localStream = stream; const code = randCode(); currentRoom = code; document.getElementById('roomCode').style.display = 'block'; document.getElementById('roomCode').textContent = code; document.getElementById('copyBtn').style.display = 'block'; document.getElementById('stopHostBtn').style.display = 'block'; setStatus('جاري الاتصال بالخادم...', 'waiting'); peer = new Peer('room-' + code, PEER_SERVER); peer.on('open', () => { setStatus(`✅ الغرفة جاهزة! أعطِ الكود للهاتف: ${code}`, 'success'); }); peer.on('call', call => { currentCall = call; setStatus('📱 الهاتف اتصل! جاري الإجابة...', 'waiting'); call.answer(localStream); call.on('stream', remoteStream => { const audio = document.getElementById('remoteAudio'); audio.srcObject = remoteStream; audio.style.display = 'block'; audio.play().catch(() => {}); setStatus('🟢 متصل! تسمع المايك من الهاتف الآن', 'success'); }); call.on('close', () => setStatus('انقطع الاتصال بالهاتف', 'error')); }); peer.on('error', e => setStatus('خطأ: ' + e.message, 'error')); } catch(e) { setStatus('فشل: ' + e.message, 'error'); } } // ===== الانضمام (الهاتف - iPhone) ===== async function joinRoom() { const code = document.getElementById('joinCode').value.trim().toUpperCase(); if (!code || code.length < 4) { setStatus('أدخل الكود الصحيح', 'error'); return; } try { setStatus('جاري طلب المايك...', 'waiting'); const micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); localStream = micStream; peer = new Peer(PEER_SERVER); peer.on('open', myId => { setStatus('جاري الاتصال بالغرفة...', 'waiting'); const call = peer.call('room-' + code, micStream); currentCall = call; call.on('stream', remoteStream => { const audio = document.getElementById('remoteAudio'); audio.srcObject = remoteStream; audio.style.display = 'block'; audio.play().catch(() => {}); setStatus('🟢 متصل! تسمع صوت Windows الآن', 'success'); document.getElementById('stopGuestBtn').style.display = 'block'; }); call.on('close', () => setStatus('انقطع الاتصال', 'error')); call.on('error', e => setStatus('خطأ في الاتصال: ' + e.message, 'error')); }); peer.on('error', e => setStatus('خطأ: ' + e.message, 'error')); } catch(e) { setStatus('فشل: ' + e.message, 'error'); } } function copyCode() { navigator.clipboard.writeText(currentRoom).then(() => { setStatus('تم نسخ الكود ✅', 'success'); }); } function stopHost() { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (currentCall) currentCall.close(); if (peer) peer.destroy(); document.getElementById('roomCode').style.display = 'none'; document.getElementById('copyBtn').style.display = 'none'; document.getElementById('stopHostBtn').style.display = 'none'; setStatus('تم إيقاف المشاركة', 'error'); } function stopGuest() { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (currentCall) currentCall.close(); if (peer) peer.destroy(); document.getElementById('stopGuestBtn').style.display = 'none'; document.getElementById('remoteAudio').style.display = 'none'; setStatus('تم قطع الاتصال', 'error'); } </script> <!-- مكتبة PeerJS المجانية --> <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> </body> </html>
