<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>مشاركة الصوت</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; } h1 { font-size: 1.6rem; margin-bottom: 8px; color: #a78bfa; } p.sub { font-size: 0.9rem; color: #888; margin-bottom: 30px; } .card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; margin-bottom: 16px; } .card h2 { font-size: 1rem; margin-bottom: 16px; color: #c4b5fd; } input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #3d3d6e; background: #0f0f1a; color: #fff; font-size: 0.95rem; margin-bottom: 12px; text-align: center; letter-spacing: 4px; font-size: 1.2rem; } button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: bold; margin-top: 8px; } .btn-primary { background: #7c3aed; color: #fff; } .btn-primary:hover { background: #6d28d9; } .btn-primary:disabled { background: #3d2070; color: #888; cursor: not-allowed; } .btn-secondary { background: #1e3a5f; color: #7dd3fc; } .btn-danger { background: #7f1d1d; color: #fca5a5; } #status { margin-top: 8px; padding: 12px 16px; border-radius: 10px; background: #0f0f1a; border: 1px solid #2d2d4e; font-size: 0.9rem; color: #94a3b8; text-align: center; width: 100%; max-width: 420px; } #roomCode { font-size: 2rem; font-weight: bold; color: #a78bfa; letter-spacing: 8px; text-align: center; margin: 14px 0 6px; display: none; background: #0f0f1a; padding: 12px; border-radius: 10px; border: 1px dashed #7c3aed; } audio { width: 100%; margin-top: 12px; border-radius: 8px; display: none; } #log { margin-top: 12px; padding: 10px; border-radius: 8px; background: #0a0a14; border: 1px solid #1e1e3e; font-size: 0.75rem; color: #4ade80; width: 100%; max-width: 420px; max-height: 120px; overflow-y: auto; direction: ltr; text-align: left; display: none; } </style> </head> <body> <h1>🔊 مشاركة الصوت</h1> <p class="sub">Windows → iPhone | iPhone Mic → Windows</p> <div class="card"> <h2>📡 إنشاء غرفة — Windows (Chrome)</h2> <button class="btn-primary" id="createBtn" onclick="createRoom()">إنشاء غرفة + مشاركة الصوت</button> <div id="roomCode"></div> <button class="btn-secondary" id="copyBtn" onclick="copyCode()" style="display:none">📋 نسخ الكود</button> <button class="btn-danger" id="stopHostBtn" onclick="stopHost()" style="display:none">⏹ إيقاف</button> </div> <div class="card"> <h2>🎙 الانضمام — iPhone (Safari)</h2> <input type="text" id="joinCode" placeholder="XXXXXX" maxlength="6"/> <button class="btn-primary" id="joinBtn" onclick="joinRoom()">انضمام + تفعيل المايك</button> <button class="btn-danger" id="stopGuestBtn" onclick="stopGuest()" style="display:none">⏹ قطع الاتصال</button> <audio id="remoteAudio" controls></audio> </div> <div id="status">⏳ جاري تحميل المكتبة...</div> <div id="log"></div> <script> function log(msg) { const el = document.getElementById('log'); el.style.display = 'block'; el.innerHTML += msg + '<br>'; el.scrollTop = el.scrollHeight; console.log(msg); } function setStatus(msg) { document.getElementById('status').textContent = msg; log(msg); } let peer, currentCall, localStream, currentRoom; // ===== تحقق من تحميل PeerJS ===== function waitForPeer(callback) { let tries = 0; const interval = setInterval(() => { tries++; if (typeof Peer !== 'undefined') { clearInterval(interval); log('✅ PeerJS محمّل'); callback(); } else if (tries > 20) { clearInterval(interval); setStatus('❌ فشل تحميل المكتبة — تأكد من الإنترنت وأعد تحميل الصفحة'); } }, 300); } window.onload = () => { waitForPeer(() => { setStatus('✅ جاهز — اضغط إنشاء غرفة أو أدخل الكود'); }); }; function randCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); } // ===== إنشاء غرفة ===== async function createRoom() { if (typeof Peer === 'undefined') { setStatus('❌ المكتبة لم تُحمَّل بعد، أعد تحميل الصفحة'); return; } const btn = document.getElementById('createBtn'); btn.disabled = true; btn.textContent = 'جاري التحضير...'; try { setStatus('🎤 جاري طلب الصوت...'); log('طلب getDisplayMedia...'); let stream; try { stream = await navigator.mediaDevices.getDisplayMedia({ video: false, audio: true }); log('✅ تم الحصول على صوت النظام'); } catch (e) { log('⚠️ رُفض صوت النظام، جرب المايك: ' + e.message); try { stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); log('✅ تم الحصول على المايك'); setStatus('⚠️ يعمل بالمايك فقط (لم يُسمح بصوت النظام)'); } catch (e2) { setStatus('❌ تم رفض الإذن: ' + e2.message); btn.disabled = false; btn.textContent = 'إنشاء غرفة + مشاركة الصوت'; return; } } localStream = stream; const code = randCode(); currentRoom = code; const roomEl = document.getElementById('roomCode'); roomEl.style.display = 'block'; roomEl.textContent = code; document.getElementById('copyBtn').style.display = 'block'; document.getElementById('stopHostBtn').style.display = 'block'; setStatus('🔗 جاري الاتصال بالخادم...'); peer = new Peer('room-' + code, { host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 2 }); peer.on('open', id => { log('✅ متصل بـ PeerJS: ' + id); setStatus('✅ الغرفة جاهزة! الكود: ' + code + ' — في انتظار الهاتف...'); btn.textContent = 'الغرفة نشطة ✅'; }); peer.on('call', call => { currentCall = call; log('📱 اتصال وارد من الهاتف'); setStatus('📱 الهاتف اتصل! جاري الإجابة...'); call.answer(localStream); call.on('stream', remoteStream => { const audio = document.getElementById('remoteAudio'); audio.srcObject = remoteStream; audio.style.display = 'block'; audio.play().catch(e => log('تشغيل تلقائي مرفوض: ' + e)); setStatus('🟢 متصل! صوت الهاتف يصل الآن'); }); call.on('close', () => setStatus('🔴 انقطع اتصال الهاتف')); call.on('error', e => { log('خطأ call: ' + e); setStatus('❌ ' + e); }); }); peer.on('error', e => { log('❌ خطأ Peer: ' + e.type + ' - ' + e.message); if (e.type === 'unavailable-id') { setStatus('❌ هذا الكود مستخدم، جرب مرة أخرى'); } else { setStatus('❌ خطأ: ' + e.type); } btn.disabled = false; btn.textContent = 'إنشاء غرفة + مشاركة الصوت'; }); peer.on('disconnected', () => { log('⚠️ انقطع عن الخادم، جاري إعادة الاتصال...'); peer.reconnect(); }); } catch (e) { log('❌ خطأ عام: ' + e.message); setStatus('❌ خطأ: ' + e.message); btn.disabled = false; btn.textContent = 'إنشاء غرفة + مشاركة الصوت'; } } // ===== الانضمام ===== async function joinRoom() { if (typeof Peer === 'undefined') { setStatus('❌ المكتبة لم تُحمَّل، أعد تحميل الصفحة'); return; } const code = document.getElementById('joinCode').value.trim().toUpperCase(); if (!code || code.length < 4) { setStatus('⚠️ أدخل الكود الصحيح'); return; } const btn = document.getElementById('joinBtn'); btn.disabled = true; btn.textContent = 'جاري الاتصال...'; try { setStatus('🎤 جاري طلب المايك...'); const micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); localStream = micStream; log('✅ تم الحصول على المايك'); peer = new Peer({ host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 2 }); peer.on('open', myId => { log('✅ متصل بـ PeerJS: ' + myId); setStatus('📡 جاري الاتصال بالغرفة ' + code + '...'); const call = peer.call('room-' + code, micStream); currentCall = call; call.on('stream', remoteStream => { const audio = document.getElementById('remoteAudio'); audio.srcObject = remoteStream; audio.style.display = 'block'; audio.play().catch(e => log('تشغيل: ' + e)); setStatus('🟢 متصل! صوت Windows يصل الآن'); document.getElementById('stopGuestBtn').style.display = 'block'; btn.textContent = 'متصل ✅'; }); call.on('close', () => { setStatus('🔴 انقطع الاتصال'); btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; }); call.on('error', e => { log('❌ خطأ call: ' + e); setStatus('❌ فشل الاتصال بالغرفة — تأكد من الكود'); btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; }); }); peer.on('error', e => { log('❌ ' + e.type + ': ' + e.message); if (e.type === 'peer-unavailable') { setStatus('❌ الغرفة غير موجودة — تأكد من الكود'); } else { setStatus('❌ خطأ: ' + e.type); } btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; }); } catch (e) { log('❌ ' + e.message); setStatus('❌ فشل: ' + e.message); btn.disabled = false; btn.textContent = 'انضمام + تفعيل المايك'; } } function copyCode() { navigator.clipboard.writeText(currentRoom) .then(() => setStatus('✅ تم نسخ الكود: ' + currentRoom)) .catch(() => setStatus('الكود: ' + currentRoom + ' — انسخه يدوياً')); } function stopHost() { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (currentCall) currentCall.close(); if (peer) peer.destroy(); document.getElementById('roomCode').style.display = 'none'; document.getElementById('copyBtn').style.display = 'none'; document.getElementById('stopHostBtn').style.display = 'none'; document.getElementById('createBtn').disabled = false; document.getElementById('createBtn').textContent = 'إنشاء غرفة + مشاركة الصوت'; setStatus('⏹ تم إيقاف المشاركة'); } function stopGuest() { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (currentCall) currentCall.close(); if (peer) peer.destroy(); document.getElementById('stopGuestBtn').style.display = 'none'; document.getElementById('remoteAudio').style.display = 'none'; document.getElementById('joinBtn').disabled = false; document.getElementById('joinBtn').textContent = 'انضمام + تفعيل المايك'; setStatus('⏹ تم قطع الاتصال'); } </script> <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> </body> </html>
