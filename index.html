<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>مشاركة الشاشة</title> <style> *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px} h1{font-size:1.6rem;margin-bottom:8px;color:#a78bfa} p.sub{font-size:.9rem;color:#888;margin-bottom:30px} .card{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:16px;padding:24px;width:100%;max-width:480px;margin-bottom:16px} .card h2{font-size:1rem;margin-bottom:16px;color:#c4b5fd} input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #3d3d6e;background:#0f0f1a;color:#fff;font-size:1.2rem;margin-bottom:12px;text-align:center;letter-spacing:4px} button{width:100%;padding:12px;border-radius:10px;border:none;font-size:1rem;cursor:pointer;font-weight:bold;margin-top:8px;transition:.2s} .bp{background:#7c3aed;color:#fff}.bp:hover{background:#6d28d9}.bp:disabled{background:#3d2070;color:#888;cursor:not-allowed} .bs{background:#1e3a5f;color:#7dd3fc} .bd{background:#7f1d1d;color:#fca5a5} #status{margin-top:8px;padding:12px 16px;border-radius:10px;background:#0f0f1a;border:1px solid #2d2d4e;font-size:.9rem;color:#94a3b8;text-align:center;width:100%;max-width:480px} #roomCode{font-size:2rem;font-weight:bold;color:#a78bfa;letter-spacing:8px;text-align:center;margin:14px 0 6px;display:none;background:#0f0f1a;padding:12px;border-radius:10px;border:1px dashed #7c3aed} /* فيديو المضيف (معاينة صغيرة) */ #localVideo{width:100%;border-radius:10px;margin-top:12px;display:none;max-height:160px;object-fit:contain;background:#000} /* فيديو المشاهد (الشاشة الكاملة تقريباً) */ #remoteVideo{width:100%;border-radius:10px;margin-top:12px;display:none;background:#000;max-height:300px;object-fit:contain} audio{display:none} #log{margin-top:12px;padding:10px;border-radius:8px;background:#0a0a14;border:1px solid #1e1e3e;font-size:.75rem;color:#4ade80;width:100%;max-width:480px;max-height:140px;overflow-y:auto;direction:ltr;text-align:left} </style> </head> <body> <h1>🖥️ مشاركة الشاشة</h1> <p class="sub">Windows → iPhone | iPhone Mic → Windows</p> <div class="card"> <h2>📡 مشاركة الشاشة — Windows (Chrome)</h2> <button class="bp" id="createBtn">إنشاء غرفة + مشاركة الشاشة</button> <div id="roomCode"></div> <button class="bs" id="copyBtn" style="display:none">📋 نسخ الكود</button> <button class="bd" id="stopHostBtn" style="display:none">⏹ إيقاف المشاركة</button> <video id="localVideo" autoplay muted playsinline></video> </div> <div class="card"> <h2>📱 مشاهدة الشاشة — iPhone (Safari)</h2> <input type="text" id="joinCode" placeholder="XXXXXX" maxlength="6"/> <button class="bp" id="joinBtn">انضمام + مشاهدة الشاشة</button> <button class="bd" id="stopGuestBtn" style="display:none">⏹ قطع الاتصال</button> <video id="remoteVideo" autoplay playsinline controls></video> <audio id="remoteAudio" autoplay></audio> </div> <div id="status">⏳ جاري التحميل...</div> <div id="log"></div> <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js" onload="onPeerLoaded()" onerror="onPeerError()"></script> <script> (function(){ var peer, currentCall, localStream, currentRoom; function log(msg){ var el=document.getElementById('log'); el.innerHTML+=msg+'<br>'; el.scrollTop=el.scrollHeight; } function setStatus(msg){ document.getElementById('status').textContent=msg; log(msg); } function randCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); } window.onPeerLoaded=function(){ log('✅ PeerJS محمّل'); setStatus('✅ جاهز — اضغط إنشاء غرفة أو أدخل الكود'); }; window.onPeerError=function(){ setStatus('❌ فشل تحميل المكتبة — تأكد من الإنترنت وأعد التحميل'); }; window.addEventListener('DOMContentLoaded',function(){ document.getElementById('createBtn').addEventListener('click',createRoom); document.getElementById('copyBtn').addEventListener('click',copyCode); document.getElementById('stopHostBtn').addEventListener('click',stopHost); document.getElementById('joinBtn').addEventListener('click',joinRoom); document.getElementById('stopGuestBtn').addEventListener('click',stopGuest); }); // ===== إنشاء الغرفة - Windows ===== function createRoom(){ if(typeof Peer==='undefined'){setStatus('❌ المكتبة لم تُحمَّل — أعد تحميل الصفحة');return;} var btn=document.getElementById('createBtn'); btn.disabled=true; btn.textContent='جاري التحضير...'; setStatus('🖥️ جاري طلب مشاركة الشاشة...'); // نطلب الشاشة مع الصوت معاً navigator.mediaDevices.getDisplayMedia({ video:{ cursor:'always', displaySurface:'monitor' }, audio:true }) .then(function(screenStream){ log('✅ تم الحصول على الشاشة'); // معاينة صغيرة للمضيف var localVid=document.getElementById('localVideo'); localVid.srcObject=screenStream; localVid.style.display='block'; localStream=screenStream; // إذا توقف المستخدم من نافذة المتصفح screenStream.getVideoTracks()[0].onended=function(){ setStatus('⏹ تم إيقاف مشاركة الشاشة'); stopHost(); }; startHost(screenStream); }) .catch(function(e){ log('❌ رُفض: '+e.message); setStatus('❌ يجب السماح بمشاركة الشاشة — '+e.message); btn.disabled=false; btn.textContent='إنشاء غرفة + مشاركة الشاشة'; }); } function startHost(stream){ var code=randCode(); currentRoom=code; var roomEl=document.getElementById('roomCode'); roomEl.style.display='block'; roomEl.textContent=code; document.getElementById('copyBtn').style.display='block'; document.getElementById('stopHostBtn').style.display='block'; setStatus('🔗 جاري الاتصال بالخادم...'); peer=new Peer('room-'+code,{ host:'0.peerjs.com',port:443,path:'/',secure:true }); peer.on('open',function(id){ log('✅ متصل: '+id); setStatus('✅ الغرفة جاهزة! الكود: '+code+' — في انتظار الهاتف...'); document.getElementById('createBtn').textContent='الغرفة نشطة ✅'; }); peer.on('call',function(call){ currentCall=call; setStatus('📱 الهاتف اتصل! جاري الإجابة...'); call.answer(stream); call.on('stream',function(remoteStream){ // نستقبل المايك من الهاتف var audio=document.getElementById('remoteAudio'); audio.srcObject=remoteStream; audio.play().catch(function(){}); setStatus('🟢 متصل! الهاتف يشاهد شاشتك الآن'); }); call.on('close',function(){setStatus('🔴 انقطع اتصال الهاتف');}); call.on('error',function(e){setStatus('❌ '+e);}); }); peer.on('error',function(e){ log('❌ '+e.type); setStatus('❌ خطأ: '+e.type); var btn=document.getElementById('createBtn'); btn.disabled=false; btn.textContent='إنشاء غرفة + مشاركة الشاشة'; }); } // ===== الانضمام - iPhone ===== function joinRoom(){ if(typeof Peer==='undefined'){setStatus('❌ المكتبة لم تُحمَّل — أعد تحميل الصفحة');return;} var code=document.getElementById('joinCode').value.trim().toUpperCase(); if(!code||code.length<4){setStatus('⚠️ أدخل الكود الصحيح');return;} var btn=document.getElementById('joinBtn'); btn.disabled=true; btn.textContent='جاري الاتصال...'; setStatus('🎤 جاري طلب المايك...'); navigator.mediaDevices.getUserMedia({audio:true,video:false}) .then(function(micStream){ localStream=micStream; log('✅ المايك جاهز'); peer=new Peer({ host:'0.peerjs.com',port:443,path:'/',secure:true }); peer.on('open',function(myId){ log('✅ متصل: '+myId); setStatus('📡 جاري الاتصال بالغرفة '+code+'...'); var call=peer.call('room-'+code,micStream); currentCall=call; call.on('stream',function(remoteStream){ // نعرض الشاشة على الهاتف var vid=document.getElementById('remoteVideo'); vid.srcObject=remoteStream; vid.style.display='block'; vid.play().catch(function(){}); setStatus('🟢 متصل! شاشة Windows تظهر الآن'); document.getElementById('stopGuestBtn').style.display='block'; btn.textContent='متصل ✅'; }); call.on('close',function(){ setStatus('🔴 انقطع الاتصال'); btn.disabled=false; btn.textContent='انضمام + مشاهدة الشاشة'; }); }); peer.on('error',function(e){ log('❌ '+e.type); if(e.type==='peer-unavailable'){ setStatus('❌ الغرفة غير موجودة — تأكد من الكود'); } else { setStatus('❌ خطأ: '+e.type); } btn.disabled=false; btn.textContent='انضمام + مشاهدة الشاشة'; }); }) .catch(function(e){ setStatus('❌ رُفض المايك: '+e.message); btn.disabled=false; btn.textContent='انضمام + مشاهدة الشاشة'; }); } function copyCode(){ if(navigator.clipboard){ navigator.clipboard.writeText(currentRoom) .then(function(){setStatus('✅ تم النسخ: '+currentRoom);}) .catch(function(){setStatus('الكود: '+currentRoom);}); } else { setStatus('الكود: '+currentRoom); } } function stopHost(){ if(localStream)localStream.getTracks().forEach(function(t){t.stop();}); if(currentCall)currentCall.close(); if(peer)peer.destroy(); document.getElementById('roomCode').style.display='none'; document.getElementById('copyBtn').style.display='none'; document.getElementById('stopHostBtn').style.display='none'; document.getElementById('localVideo').style.display='none'; var btn=document.getElementById('createBtn'); btn.disabled=false; btn.textContent='إنشاء غرفة + مشاركة الشاشة'; setStatus('⏹ تم إيقاف المشاركة'); } function stopGuest(){ if(localStream)localStream.getTracks().forEach(function(t){t.stop();}); if(currentCall)currentCall.close(); if(peer)peer.destroy(); document.getElementById('stopGuestBtn').style.display='none'; document.getElementById('remoteVideo').style.display='none'; var btn=document.getElementById('joinBtn'); btn.disabled=false; btn.textContent='انضمام + مشاهدة الشاشة'; setStatus('⏹ تم قطع الاتصال'); } })(); </script> </body> </html>
