<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مشاركة الشاشة</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #a78bfa;
    }

    p.sub {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 30px;
      text-align: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 1rem;
      margin-bottom: 16px;
      color: #c4b5fd;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #3d3d6e;
      background: #0f0f1a;
      color: #fff;
      font-size: 1.2rem;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 4px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      margin-top: 8px;
      transition: 0.2s;
    }

    .bp {
      background: #7c3aed;
      color: #fff;
    }

    .bp:hover {
      background: #6d28d9;
    }

    .bp:disabled {
      background: #3d2070;
      color: #888;
      cursor: not-allowed;
    }

    .bs {
      background: #1e3a5f;
      color: #7dd3fc;
    }

    .bd {
      background: #7f1d1d;
      color: #fca5a5;
    }

    #status {
      margin-top: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      font-size: 0.9rem;
      color: #94a3b8;
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    #roomCode {
      font-size: 2rem;
      font-weight: bold;
      color: #a78bfa;
      letter-spacing: 8px;
      text-align: center;
      margin: 14px 0 6px;
      display: none;
      background: #0f0f1a;
      padding: 12px;
      border-radius: 10px;
      border: 1px dashed #7c3aed;
    }

    #localVideo {
      width: 100%;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
      max-height: 160px;
      object-fit: contain;
      background: #000;
    }

    #remoteVideo {
      width: 100%;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
      background: #000;
      max-height: 300px;
      object-fit: contain;
    }

    audio {
      display: none;
    }

    #log {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #0a0a14;
      border: 1px solid #1e1e3e;
      font-size: 0.75rem;
      color: #4ade80;
      width: 100%;
      max-width: 480px;
      max-height: 160px;
      overflow-y: auto;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>🖥️ مشاركة الشاشة</h1>
  <p class="sub">Windows → iPhone | iPhone Mic → Windows</p>

  <div class="card">
    <h2>📡 مشاركة الشاشة — Windows (Chrome)</h2>
    <button class="bp" id="createBtn">إنشاء غرفة + مشاركة الشاشة</button>
    <div id="roomCode"></div>
    <button class="bs" id="copyBtn" style="display:none;">📋 نسخ الكود</button>
    <button class="bd" id="stopHostBtn" style="display:none;">⏹ إيقاف المشاركة</button>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <div class="card">
    <h2>📱 مشاهدة الشاشة — iPhone (Safari)</h2>
    <input type="text" id="joinCode" placeholder="XXXXXX" maxlength="6" />
    <button class="bp" id="joinBtn">انضمام + مشاهدة الشاشة</button>
    <button class="bd" id="stopGuestBtn" style="display:none;">⏹ قطع الاتصال</button>
    <video id="remoteVideo" autoplay playsinline controls></video>
    <audio id="remoteAudio" autoplay></audio>
  </div>

  <div id="status">⏳ جاري التحميل...</div>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    (function () {
      let peer = null;
      let currentCall = null;
      let localStream = null;
      let currentRoom = null;

      const createBtn = document.getElementById("createBtn");
      const copyBtn = document.getElementById("copyBtn");
      const stopHostBtn = document.getElementById("stopHostBtn");
      const joinBtn = document.getElementById("joinBtn");
      const stopGuestBtn = document.getElementById("stopGuestBtn");
      const roomCodeEl = document.getElementById("roomCode");
      const joinCodeEl = document.getElementById("joinCode");
      const localVideo = document.getElementById("localVideo");
      const remoteVideo = document.getElementById("remoteVideo");
      const remoteAudio = document.getElementById("remoteAudio");
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");

      function log(msg) {
        logEl.innerHTML += msg + "<br>";
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      function setStatus(msg) {
        statusEl.textContent = msg;
        log(msg);
      }

      function randCode() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
      }

      function resetHostUI() {
        roomCodeEl.style.display = "none";
        roomCodeEl.textContent = "";
        copyBtn.style.display = "none";
        stopHostBtn.style.display = "none";
        localVideo.style.display = "none";
        localVideo.srcObject = null;
        createBtn.disabled = false;
        createBtn.textContent = "إنشاء غرفة + مشاركة الشاشة";
      }

      function resetGuestUI() {
        stopGuestBtn.style.display = "none";
        remoteVideo.style.display = "none";
        remoteVideo.srcObject = null;
        joinBtn.disabled = false;
        joinBtn.textContent = "انضمام + مشاهدة الشاشة";
      }

      function cleanupPeer() {
        if (currentCall) {
          try {
            currentCall.close();
          } catch (e) {}
          currentCall = null;
        }

        if (peer) {
          try {
            peer.destroy();
          } catch (e) {}
          peer = null;
        }
      }

      function cleanupLocalStream() {
        if (localStream) {
          try {
            localStream.getTracks().forEach(track => track.stop());
          } catch (e) {}
          localStream = null;
        }
      }

      async function createRoom() {
        if (typeof Peer === "undefined") {
          setStatus("❌ مكتبة PeerJS لم يتم تحميلها");
          return;
        }

        createBtn.disabled = true;
        createBtn.textContent = "جاري التحضير...";
        setStatus("🖥️ جاري طلب مشاركة الشاشة...");

        cleanupPeer();
        cleanupLocalStream();

        try {
          const screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: {
              cursor: "always"
            },
            audio: true
          });

          localStream = screenStream;
          localVideo.srcObject = screenStream;
          localVideo.style.display = "block";

          const videoTracks = screenStream.getVideoTracks();
          if (videoTracks.length > 0) {
            videoTracks[0].onended = function () {
              setStatus("⏹ تم إيقاف مشاركة الشاشة");
              stopHost();
            };
          }

          startHost(screenStream);
        } catch (e) {
          setStatus("❌ يجب السماح بمشاركة الشاشة — " + e.message);
          createBtn.disabled = false;
          createBtn.textContent = "إنشاء غرفة + مشاركة الشاشة";
        }
      }

      function startHost(stream) {
        const code = randCode();
        currentRoom = code;

        roomCodeEl.style.display = "block";
        roomCodeEl.textContent = code;
        copyBtn.style.display = "block";
        stopHostBtn.style.display = "block";

        setStatus("🔗 جاري إنشاء الغرفة...");

        peer = new Peer("room-" + code, {
          host: "0.peerjs.com",
          port: 443,
          path: "/",
          secure: true
        });

        peer.on("open", function (id) {
          log("✅ Host peer open: " + id);
          createBtn.textContent = "الغرفة نشطة ✅";
          setStatus("✅ الغرفة جاهزة! الكود: " + code + " — في انتظار الهاتف...");
        });

        peer.on("call", function (call) {
          currentCall = call;
          setStatus("📱 الهاتف اتصل، جاري الرد...");

          call.answer(stream);

          call.on("stream", function (remoteStream) {
            remoteAudio.srcObject = remoteStream;
            remoteAudio.play().catch(function () {});
            setStatus("🟢 متصل! الهاتف يشاهد الشاشة الآن");
          });

          call.on("close", function () {
            setStatus("🔴 انقطع اتصال الهاتف");
          });

          call.on("error", function (err) {
            setStatus("❌ خطأ في الاتصال: " + err.message);
          });
        });

        peer.on("error", function (err) {
          setStatus("❌ خطأ Peer: " + err.type);
          log("Peer Error: " + err.type + " | " + (err.message || ""));
          resetHostUI();
        });

        peer.on("disconnected", function () {
          log("⚠️ تم فصل Peer");
        });
      }

      async function joinRoom() {
        if (typeof Peer === "undefined") {
          setStatus("❌ مكتبة PeerJS لم يتم تحميلها");
          return;
        }

        const code = joinCodeEl.value.trim().toUpperCase();

        if (!code || code.length !== 6) {
          setStatus("⚠️ أدخل كود صحيح من 6 أحرف");
          return;
        }

        joinBtn.disabled = true;
        joinBtn.textContent = "جاري الاتصال...";
        setStatus("🎤 جاري طلب إذن المايك...");

        cleanupPeer();
        cleanupLocalStream();

        try {
          const micStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: false
          });

          localStream = micStream;

          peer = new Peer({
            host: "0.peerjs.com",
            port: 443,
            path: "/",
            secure: true
          });

          peer.on("open", function (myId) {
            log("✅ Guest peer open: " + myId);
            setStatus("📡 جاري الاتصال بالغرفة " + code + "...");

            const call = peer.call("room-" + code, micStream);
            currentCall = call;

            call.on("stream", function (remoteStream) {
              remoteVideo.srcObject = remoteStream;
              remoteVideo.style.display = "block";
              remoteVideo.play().catch(function () {});
              stopGuestBtn.style.display = "block";
              joinBtn.textContent = "متصل ✅";
              setStatus("🟢 متصل! شاشة Windows تظهر الآن");
            });

            call.on("close", function () {
              setStatus("🔴 انقطع الاتصال");
              resetGuestUI();
            });

            call.on("error", function (err) {
              setStatus("❌ خطأ في المكالمة: " + err.message);
              resetGuestUI();
            });
          });

          peer.on("error", function (err) {
            if (err.type === "peer-unavailable") {
              setStatus("❌ الغرفة غير موجودة — تأكد من الكود");
            } else {
              setStatus("❌ خطأ Peer: " + err.type);
            }

            log("Peer Error: " + err.type + " | " + (err.message || ""));
            resetGuestUI();
          });
        } catch (e) {
          setStatus("❌ تم رفض المايك: " + e.message);
          resetGuestUI();
        }
      }

      function copyCode() {
        if (!currentRoom) {
          setStatus("❌ لا يوجد كود لنسخه");
          return;
        }

        if (navigator.clipboard) {
          navigator.clipboard.writeText(currentRoom)
            .then(function () {
              setStatus("✅ تم نسخ الكود: " + currentRoom);
            })
            .catch(function () {
              setStatus("📋 الكود: " + currentRoom);
            });
        } else {
          setStatus("📋 الكود: " + currentRoom);
        }
      }

      function stopHost() {
        cleanupLocalStream();
        cleanupPeer();
        resetHostUI();
        setStatus("⏹ تم إيقاف المشاركة");
      }

      function stopGuest() {
        cleanupLocalStream();
        cleanupPeer();
        resetGuestUI();
        setStatus("⏹ تم قطع الاتصال");
      }

      window.addEventListener("DOMContentLoaded", function () {
        createBtn.addEventListener("click", createRoom);
        copyBtn.addEventListener("click", copyCode);
        stopHostBtn.addEventListener("click", stopHost);
        joinBtn.addEventListener("click", joinRoom);
        stopGuestBtn.addEventListener("click", stopGuest);

        if (typeof Peer !== "undefined") {
          setStatus("✅ جاهز — اضغط إنشاء غرفة أو أدخل الكود");
        } else {
          setStatus("❌ فشل تحميل مكتبة PeerJS");
        }
      });
    })();
  </script>
</body>
</html>
